<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MenuseriePro | Mot de passe oublie</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <!-- Page simple pour recuperer l'acces au compte -->
    <main class="auth-layout">
        <section class="auth-brand">
            <a class="brand large" href="index.html"><span class="brand-mark">MP</span><span>MenuseriePro</span></a>
            <h1>Recuperez votre acces.</h1>
            <p>Entrez l'email du compte pour recevoir les instructions.</p>
        </section>
        <form class="auth-card" data-auth-form>
            <p class="eyebrow">Securite</p>
            <h2>Mot de passe oublie</h2>
            <label>Email<input type="email" name="email" required placeholder="admin@menuseriepro.ci"></label>
            <button class="btn btn-primary" type="submit">Envoyer le lien</button>
            <a class="text-link" href="login.html">Retour connexion</a>
        </form>
    </main>
    <script src="index.js"></script>
</body>
</html>
