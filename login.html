<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MenuiseriePro | Connexion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <!-- Page de connexion du gérant -->
    <main class="auth-layout">
        <section class="auth-brand">
            <a class="brand large" href="index.html"><span class="brand-mark">MP</span><span>MenuiseriePro</span></a>
            <h1>Connectez-vous à MenuiseriePro.</h1>
            <p>Entrez dans votre espace pour gérer l'atelier rapidement.</p>
        </section>
        <form class="auth-card" data-auth-form novalidate>
            <p class="eyebrow">Connexion</p>
            <h2>Bienvenue</h2>
            <label>Email<input type="email" name="email" required placeholder="admin@menuiseriepro.ci"></label>
            <label>Mot de passe<input type="password" name="password" required placeholder="Votre mot de passe"></label>
            <button class="btn btn-primary" type="submit">Se connecter</button>
            <a class="text-link" href="forgot-password.html">Mot de passe oublié ?</a>
            <p>Pas encore de compte ? <a class="text-link" href="register.html">Créer un compte</a></p>
        </form>
    </main>
    <script src="index.js"></script>
</body>
</html>
