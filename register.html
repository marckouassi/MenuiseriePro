<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MenuiseriePro | Inscription</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <!-- Page d'inscription du compte atelier -->
    <main class="auth-layout">
        <section class="auth-brand">
            <a class="brand large" href="index.html"><span class="brand-mark">MP</span><span>MenuiseriePro</span></a>
            <h1>Créez votre espace MenuiseriePro.</h1>
            <p>Ajoutez votre compte pour gérer la menuiserie simplement.</p>
        </section>
        <form class="auth-card" data-auth-form novalidate>
            <p class="eyebrow">Inscription</p>
            <h2>Nouveau compte</h2>
            <label>Nom complet<input name="name" required placeholder="Votre nom"></label>
            <label>Email<input type="email" name="email" required placeholder="email@menuiseriepro.ci"></label>
            <label>Rôle<select name="role"><option value="administrateur">Administrateur</option><option value="gerant">Gérant</option><option value="magasinier">Magasinier</option><option value="ouvrier">Ouvrier</option></select></label>
            <label>Mot de passe<input type="password" name="password" minlength="8" required placeholder="Minimum 8 caractères"></label>
            <label>Confirmation du mot de passe<input type="password" name="confirmPassword" minlength="8" required placeholder="Confirmez le mot de passe"></label>
            <button class="btn btn-primary" type="submit">Créer un compte</button>
            <p>Vous avez déjà un compte ? <a class="text-link" href="login.html">Se connecter</a></p>
        </form>
    </main>
    <script src="index.js"></script>
</body>
</html>
