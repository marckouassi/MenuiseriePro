<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MenuseriePro | Inscription</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
    <!-- Page d'inscription du compte atelier -->
    <main class="auth-layout">
        <section class="auth-brand">
            <a class="brand large" href="index.html"><span class="brand-mark">MP</span><span>MenuseriePro</span></a>
            <h1>Creez votre espace MenuseriePro.</h1>
            <p>Ajoutez votre compte pour gerer la menuiserie simplement.</p>
        </section>
        <form class="auth-card" data-auth-form>
            <p class="eyebrow">Inscription</p>
            <h2>Nouveau compte</h2>
            <label>Nom complet<input name="name" required placeholder="Votre nom"></label>
            <label>Email<input type="email" name="email" required placeholder="email@menuseriepro.ci"></label>
            <label>Mot de passe<input type="password" name="password" minlength="8" required placeholder="Minimum 8 caracteres"></label>
            <button class="btn btn-primary" type="submit">Creer le compte</button>
            <p>Vous avez deja un compte ? <a class="text-link" href="login.html">Se connecter</a></p>
        </form>
    </main>
    <script src="index.js"></script>
</body>
</html>
